<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Apps</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            margin: 0;
            padding: 20px;
            color: #222;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        h2 {
            margin-top: 40px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .item {
            text-align: center;
        }
        .item img {
            width: 64px;
            height: 64px;
            border-radius: 12px;
        }
        .item a {
            text-decoration: none;
            color: #222;
            font-size: 14px;
            display: block;
            margin-top: 8px;
        }
    </style>
</head>

<body>

<h1>Enterprise AI Apps</h1>

<div id="app-container"></div>

<script src="scripts/ai-guide.js"></script>
<script>
loadAIApps([
    "Finance AI",
    "Education AI",
    "Marketing AI",
    "Automation AI",
    "Natural Lauguage",
    "Computer Vision",
    "Speech Recognition",
    "Health AI"
]);
</script>

</body>
</html>
