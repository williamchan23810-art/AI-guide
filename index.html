    body {

      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f9f9f9;
      color: #222;
    }
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    header img {
      width: 64px;
      height: 64px;
    }
    header h1 {
      font-size: 2rem;
      margin: 0;
    }
    section.category {
      margin-bottom: 2rem;
    }
    section.category h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      border-bottom: 2px solid #0078d4;
      padding-bottom: 0.25rem;
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .icon-grid a {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #0078d4;
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }
    .icon-grid a:hover {
      color: #004a8f;
    }
    .icon-grid img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin-bottom: 0.5rem;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      background: white;
      padding: 8px;
    }
    hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 2rem 0;
    }
  </style>
</head>
