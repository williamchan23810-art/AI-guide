<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Guide</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #ffffff;
            text-align: center;
        }

        .logo {
            width: 180px;
            margin-top: 40px;
        }

        h1 {
            margin-top: 10px;
            font-size: 32px;
            color: #222;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .block {
            width: 300px;
            margin: 20px;
        }

        .block img {
            width: 220px;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .block img:hover {
            transform: scale(1.05);
        }

        .desc {
            font-size: 18px;
            color: #333;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <!-- AI GUIDE LOGO -->
    <img src="images/AIguideLogo512.png" alt="AI Guide Logo" class="logo">

    <h1>AI Guide</h1>

    <div class="container">

        <!-- Consumer AI Block -->
        <div class="block">
            <a href="consumer-ai-website.html">
                <img src="images/consumer-ai-512.jpg" alt="Consumer AI Icon">
            </a>
            <p class="desc">
                Friendly, creative AI tools designed for everyday people to learn effortlessly.
            </p>
        </div>

        <!-- Enterprise AI Block -->
        <div class="block">
            <a href="enterprise-ai-website.html">
                <img src="images/enterprise-ai-512.jpg" alt="Enterprise AI Icon">
            </a>
            <p class="desc">
                Powerful, advanced AI systems built for professionals, businesses, and innovation.
            </p>
        </div>

    </div>

</body>
</html>
